<!-- jQuery CDN – paste this first, once -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<!-- Interaction 1: Mouseenter alert on hero heading -->
<script>
  $(document).ready(function () {
    $("#welcomeBanner").mouseenter(function () {
      alert("🔥 Welcome to J.A.M.'s! Flip your card to GREEN and let the meat come to you!");
    });
  });
</script>

<!-- Interaction 2: Click to hide menu cuts -->
<script>
  $(document).ready(function () {
    $(".click-to-hide").click(function () {
      $(this).slideUp(400);
    });
  });
</script>

<!-- Interaction 3: Toggle show/hide hours -->
<script>
  $(document).ready(function () {
    $("#toggleHoursBtn").click(function () {
      $(".hours-content").toggle(500);
      $(this).text(function (i, t) {
        return t === "▼ Show Hours" ? "▲ Hide Hours" : "▼ Show Hours";
      });
    });
  });
</script>

<!-- Interaction 4: Slide + color animation on promo text -->
<script>
  $(document).ready(function () {
    $("#animatePromo").click(function () {
      $("#promoText").css("color", "#c0392b").slideUp(1200).slideDown(1200);
    });
  });
</script>

<!-- Interaction 5: Append cuts to order list -->
<script>
  $(document).ready(function () {
    let count = 1;
    const cuts = [
      "Picanha — Top Sirloin Cap",
      "Fraldinha — Bottom Sirloin",
      "Costela de Boi — Beef Ribs",
      "Frango com Queijo — Chicken & Bacon",
      "Linguiça — Brazilian Sausage",
      "Abacaxi Grelhado — Grilled Pineapple"
    ];
    $("#addCutBtn").click(function () {
      const cut = cuts[(count - 1) % cuts.length];
      $("#orderList").append("<li>🥩 " + cut + " <span class='order-num'>#" + count + "</span></li>");
      count++;
    });
  });
</script>

<!-- Interaction 6: Fade toggle on grill image -->
<script>
  $(document).ready(function () {
    $("#fadeImgBtn").click(function () {
      $("#grillImg").fadeToggle(700);
      $(this).text(function (i, t) {
        return t === "Hide Photo" ? "Show Photo" : "Hide Photo";
      });
    });
  });
</script>

<!-- Interaction 7: Form input – quick table reservation -->
<script>
  $(document).ready(function () {
    $("#reserveBtn").click(function () {
      var name = $("#guestName").val().trim();
      if (name === "") {
        $("#reserveOutput").text("Please enter your name to hold a table.");
      } else {
        $("#reserveOutput").html("🎉 <strong>" + name + "</strong>, your table is being held! We'll see you at J.A.M.'s — come hungry.");
        $("#guestName").val("");
      }
    });
  });
</script>

<!-- Interaction 8: Light/Dark mode toggle -->
<script>
  $(document).ready(function () {
    $("#darkModeBtn").click(function () {
      $("body").toggleClass("light");
      $(this).text(function (i, t) {
        return t === "☀️ Light Mode" ? "🌙 Dark Mode" : "☀️ Light Mode";
      });
    });
  });
</script>
